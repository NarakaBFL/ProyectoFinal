<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario camiones - Naraka BFL</title>
    <link rel="stylesheet" href="../CSS/estilo.css">
</head>
<body>

    <header>
    <nav class="navbar">
        <h1>Naraka BFL</h1>

        <div class="nav-links">
            <ul>
               <li><a href="panel.html">Panel</a></li>
                    <li><a href="usuarios.html">Usuarios</a></li>
                    <li><a href="contenedores.html">Contenedores</a></li>
                    <li><a href="camiones.html">Camiones</a></li>
                    <li><a href="login.html">Cerrar sesión</a></li>
            </ul>
        </div>
    </nav>
</header>

    <!-- Formulario para registrar un nuevo camión en el sistema -->
    <main class="form-main">
        <section class="form-card">

            <h2>Registrar nuevo camión</h2>
            <p>Complete todos los campos para registrar un nuevo camión en el sistema.</p>

            <!-- Creación de campos para registrar al nuevo camión -->
            <form>
                <label for="fecha">Fecha:</label>
                <input type="date" id="fecha" name="fecha" placeholder="Último mantenimiento" required>

                <label for="matricula">Matrícula:</label>
                <input type="text" id="matricula" name="matricula" placeholder="Matrícula del vehículo" required>

                <select name="marca" id="marca" required>
                    <option value="">Seleccione una marca</option>
                    <option value="mercedes">Mercedes-Benz</option>
                    <option value="volvo">Volvo</option>
                    <option value="scania">Scania</option>
                    <option value="iveco">Iveco</option>
                    <option value="volkswagen">Volkswagen</option>
                </select>

                <label for="modelo">Modelo:</label>
                <input type="text" id="modelo" name="modelo" placeholder="Modelo del vehículo" required>

                <label for="carga">Capacidad de carga:</label>
                <input type="number" id="carga" name="carga" placeholder="Ingrese la capacidad de carga" required>

                <select name="estado" id="estado" required>
                    <option value="">Estado</option>
                    <option value="disponible">Disponible</option>
                    <option value="ruta">En ruta</option>
                    <option value="mantenimiento">En mantenimiento</option>
                    <option value="fueraServicio">Fuera de servicio</option>
                </select>

                <select name="chofer" id="chofer" required>
                    <option value="">Chofer asignado</option>
                    <option value="diego">Diego Lopes</option>
                    <option value="conor">Conor Gregorio</option>
                    <option value="nico">Nicolás Pérez</option>
                    <option value="carlos">Carlos Prates</option>
                </select>

                <!-- Botones de acción: Guardar y cancelar -->
                   <div class="botones-opciones">
                <button type="submit" class="btn-guardar">Guardar</button>

                <a href="camiones.html" class="btn-cancelar">Cancelar</a>
            </div>
            </form>
        </section>
    </main>

    <footer>
        <p>© Naraka BFL</p>
    </footer>
    
</body>
</html>
