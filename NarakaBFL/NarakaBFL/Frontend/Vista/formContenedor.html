<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario contenedores - Naraka BFL</title>
    <link rel="stylesheet" href="../CSS/estilo.css">
</head>
<body>

    <header>
    <nav class="navbar">
        <h1>Naraka BFL</h1>

        <div class="nav-links">
            <ul>
                <li><a href="panel.html">Panel</a></li>
                    <li><a href="usuarios.html">Usuarios</a></li>
                    <li><a href="contenedores.html">Contenedores</a></li>
                    <li><a href="camiones.html">Camiones</a></li>
                    <li><a href="login.html">Cerrar sesión</a></li>
            </ul>
        </div>
    </nav>
</header>

    <!-- formulario para registrar un nuevo contenedor en el sistema -->
    <main class="form-main">
        <section class="form-card">

            <h2>Registrar nuevo contenedor</h2>
            <p>Complete todos los campos para registrar un nuevo contenedor en el sistema.</p>

            <!-- Creación de campos para registrar el nuevo contenedor -->
            <form>
                <label for="codigo">Código:</label>
                <input type="text" id="codigo" name="codigo" placeholder="Código del contenedor" required>

                <select name="tipo" id="tipo" required>
                    <option value="">Tipo de residuo</option>
                    <option value="Papel">Papel</option>
                    <option value="plastico">Plástico</option>
                    <option value="metal">Metal</option>
                    <option value="organicos">Orgánicos</option>
                    <option value="vidrio">Vidrio</option>
                </select>
                
                <label for="litros">Capacidad:</label>
                <input type="number" id="litros" name="litros" placeholder="Litros" required>

                <label for="ubi">Ubicación:</label>
                <input type="text" id="ubi" name="ubi" placeholder="Ingrese ubicación" required>

                <select name="estado" id="estado" required>
                    <option value="">Estado</option>
                    <option value="activo">Activo</option>
                    <option value="Lleno">Lleno</option>
                    <option value="fueraServicio">Fuera de servicio</option>
                    <option value="mantenimiento">En mantenimiento</option>
                </select>

                <!-- Botones de acciones: Guardar y cancelar -->
                   <div class="botones-opciones">
                <button type="submit" class="btn-guardar">Guardar</button>

                <a href="contenedores.html" class="btn-cancelar">Cancelar</a>
            </div>
            </form>
        </section>
    </main>

    <footer>
        <p>© Naraka BFL</p>
    </footer>
    
</body>
</html>
