<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Naraka BFL</title>
    <link rel="stylesheet" href="../CSS/estilo.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <h1>Naraka BFL</h1>

            <div class="nav-links">
                <ul>
                    <li><a href="inicio.html">Inicio</a></li>
                    <li><a href="registro.html">Registrarse</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main class="login-main">
        <section class="login-card">
            <h2>Iniciar sesión</h2>
            <p>Ingresá tus datos para acceder al sistema.</p>

            <form action="panel.html">
                <label for="email">Correo electrónico</label>
                <input type="email" id="email" placeholder="ejemplo@gmail.com" required>

                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" placeholder="Ingresá tu contraseña" required>

                <button type="submit">Ingresar</button>
            </form>

            <p class="login-link">
                ¿No tenés una cuenta?
                <a href="registro.html">Registrarse</a>
            </p>
        </section>
    </main>

    <footer>
        <p>© Naraka BFL</p>
    </footer>

</body>
</html>
