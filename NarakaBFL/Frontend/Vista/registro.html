<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Naraka BFL</title>
    <link rel="stylesheet" href="../CSS/estilo.css">
</head>
<body>

    <header>
    <nav class="navbar">
        <h1>Naraka BFL</h1>

        <div class="nav-links">
            <ul>
                <li><a href="inicio.html">Inicio</a></li>
                <li><a href="login.html">Iniciar sesión</a></li>
            </ul>
        </div>
    </nav>
</header>

    <main class="registro-main">
        <section class="registro-card">

            <h2>Crear cuenta</h2>
            <p>Regístrate para acceder al sistema de gestión</p>

            <form>
                <label for="nombre">Nombre:</label>
                <input type="text" id="nombre" name="nombre" placeholder="Ingrese su nombre" required>

                <label for="apellido">Apellido:</label>
                <input type="text" id="apellido" name="apellido" placeholder="Ingrese su apellido" required>

                <label for="email">Correo electrónico:</label>
                <input type="email" id="email" name="email" placeholder="ejemplo@gmail.com" required>

                <label for="password">Contraseña:</label>
                <input type="password" id="password" name="password" placeholder="Ingrese una contraseña" required>

                <label for="confirm-password">Confirmar contraseña:</label>
                <input type="password" id="confirm-password" name="confirm-password" placeholder="Repita la contraseña" required>
            </form>

            <button type="submit">Registrarse</button>
            <p class="registro-link">
                ¿Ya tenés una cuenta? 
                <a href="login.html">Iniciar sesión</a>
            </p>

        </section>
    </main>

    <footer>
        <p>© Naraka BFL</p>
    </footer>
    
</body>
</html>
