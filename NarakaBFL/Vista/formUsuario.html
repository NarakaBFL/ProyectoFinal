<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario usuarios - Naraka BFL</title>
    <link rel="stylesheet" href="../CSS/estilo.css">
</head>
<body>

    <header>
    <nav class="navbar">
        <h1>Naraka BFL</h1>

        <div class="nav-links">
            <ul>
                <li><a href="inicio.html">Inicio</a></li>
                <li><a href="login.html">Iniciar sesión</a></li>
            </ul>
        </div>
    </nav>
</header>

    <main class="form-main">
        <section class="form-card">

            <h2>Registrar nuevo usuario</h2>
            <p>Complete todos los campos para registrar un nuevo usuario en el sistema.</p>

            <form>
                <label for="nombre">Nombre:</label>
                <input type="text" id="nombre" name="nombre" placeholder="Ingrese su nombre" required>

                <label for="apellido">Apellido:</label>
                <input type="text" id="apellido" name="apellido" placeholder="Ingrese su apellido" required>

                <label for="email">Correo electrónico:</label>
                <input type="email" id="email" name="email" placeholder="ejemplo@gmail.com" required>

                <label for="password">Contraseña:</label>
                <input type="password" id="password" name="password" placeholder="Ingrese una contraseña" required>

                <label for="confirm-password">Confirmar contraseña:</label>
                <input type="password" id="confirm-password" name="confirm-password" placeholder="Repita la contraseña" required>

                <select name="rol" id="rol" required>
                    <option value="">Seleccione un rol</option>
                    <option value="admin">Administrador</option>
                    <option value="user">Usuario</option>
                    <option value="guest">Invitado</option>
                </select>

                   <div class="botones-opciones">
                <button type="submit" class="btn-guardar">Guardar</button>

                <a href="usuarios.html" class="btn-cancelar">Cancelar</a>
            </div>
            </form>
            <p class="registro-link">
                ¿Ya tenés una cuenta? 
                <a href="login.html">Iniciar sesión</a>
            </p>

        </section>
    </main>

    <footer>
        <p>© Naraka BFL</p>
    </footer>
    
</body>
</html>
